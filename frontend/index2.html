<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica+ - Fact Checking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        main {
            padding: 30px;
        }

        .input-area {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .rating-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .rating-verdadeiro {
            background: #28a745;
            color: white;
        }

        .rating-falso {
            background: #dc3545;
            color: white;
        }

        .rating-indeterminado {
            background: #ffc107;
            color: #333;
        }

        .result-content p {
            margin: 10px 0;
        }

        .claim-text {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-style: italic;
        }

        .disclaimer {
            font-size: 12px;
            color: #6c757d;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #dee2e6;
        }

        .examples {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .example-btn {
            background: #e9ecef;
            color: #495057;
            padding: 8px 15px;
            margin: 5px;
            width: auto;
            display: inline-block;
        }

        .hidden {
            display: none !important;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Verifica+</h1>
            <p>Verificador de fatos com IA e Google Fact Check</p>
        </header>

        <main>
            <div class="input-area">
                <textarea id="claimInput" rows="4" placeholder="Digite uma afirmação para verificar...&#10;Ex: As urnas eletrônicas foram fraudadas em 2022"></textarea>
                <button id="checkBtn">⚡ Verificar</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Consultando fontes...</p>
            </div>

            <div id="result" class="result hidden">
                <div class="result-header">
                    <span id="resultIcon"></span>
                    <h3 id="resultTitle"></h3>
                </div>
                <div class="result-content">
                    <p><strong>📝 Afirmação:</strong></p>
                    <p id="claimText" class="claim-text"></p>
                    <p><strong>🏷️ Classificação:</strong> <span id="rating" class="rating-badge"></span></p>
                    <p><strong>📡 Fonte:</strong> <span id="source"></span></p>
                    <p id="publisherInfo"></p>
                    <p id="confidenceInfo"></p>
                    <p id="disclaimer" class="disclaimer"></p>
                    <p id="urlLink"></p>
                </div>
            </div>

            <div class="examples">
                <p><strong>📝 Exemplos para testar:</strong></p>
                <button class="example-btn" data-text="urnas eletrônicas foram fraudadas em 2022">Urnas fraudadas?</button>
                <button class="example-btn" data-text="Lula foi preso pela Lava Jato">Lula preso?</button>
                <button class="example-btn" data-text="Bolsonaro venceu as eleições de 2022">Bolsonaro vencedor?</button>
                <button class="example-btn" data-text="O voto impresso é mais seguro">Voto impresso?</button>
            </div>
        </main>

        <footer>
            <p>⚠️ Caráter acadêmico/experimental - não substitui fontes oficiais</p>
            <p>Algoritmo Ético | Projeto Verifica+</p>
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/check';
        
        // Elementos DOM
        const claimInput = document.getElementById('claimInput');
        const checkBtn = document.getElementById('checkBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        
        // Função principal
        async function checkClaim() {
            const claim = claimInput.value.trim();
            
            if (!claim) {
                alert('Por favor, digite uma afirmação para verificar');
                return;
            }
            
            console.log('Verificando:', claim);
            
            // Esconde resultado anterior, mostra loading
            result.classList.add('hidden');
            loading.classList.remove('hidden');
            checkBtn.disabled = true;
            checkBtn.textContent = '⏳ Verificando...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ claim: claim })
                });
                
                const data = await response.json();
                console.log('Resposta:', data);
                
                displayResult(data);
                
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor. Certifique-se que o backend está rodando em http://localhost:5000');
                
                // Mostra erro
                result.classList.remove('hidden');
                document.getElementById('resultIcon').textContent = '❌';
                document.getElementById('resultTitle').textContent = 'Erro de Conexão';
                document.getElementById('claimText').textContent = claim;
                document.getElementById('rating').textContent = 'Erro';
                document.getElementById('source').textContent = 'Backend não está rodando';
                document.getElementById('rating').className = 'rating-badge rating-indeterminado';
                
            } finally {
                loading.classList.add('hidden');
                checkBtn.disabled = false;
                checkBtn.textContent = '⚡ Verificar';
            }
        }
        
        function displayResult(data) {
            const ratingSpan = document.getElementById('rating');
            const claimText = document.getElementById('claimText');
            const sourceSpan = document.getElementById('source');
            const confidenceInfo = document.getElementById('confidenceInfo');
            const disclaimer = document.getElementById('disclaimer');
            const urlLink = document.getElementById('urlLink');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const publisherInfo = document.getElementById('publisherInfo');
            
            claimText.textContent = data.claim || 'N/A';
            sourceSpan.textContent = data.source || 'Desconhecido';
            
            let rating = data.rating || 'Indeterminado';
            let ratingClass = '';
            let icon = '';
            
            if (rating.toLowerCase().includes('verdadeiro')) {
                ratingClass = 'rating-verdadeiro';
                icon = '✅';
                resultTitle.textContent = 'Afirmação VERDADEIRA';
            } else if (rating.toLowerCase().includes('falso')) {
                ratingClass = 'rating-falso';
                icon = '❌';
                resultTitle.textContent = 'Afirmação FALSA';
            } else {
                ratingClass = 'rating-indeterminado';
                icon = '⚠️';
                resultTitle.textContent = 'Não foi possível determinar';
            }
            
            resultIcon.textContent = icon;
            ratingSpan.textContent = rating;
            ratingSpan.className = `rating-badge ${ratingClass}`;
            
            if (data.confidence) {
                confidenceInfo.innerHTML = `<strong>Confiança:</strong> ${data.confidence}%`;
                confidenceInfo.classList.remove('hidden');
            } else {
                confidenceInfo.classList.add('hidden');
            }
            
            if (data.disclaimer) {
                disclaimer.textContent = data.disclaimer;
                disclaimer.classList.remove('hidden');
            } else {
                disclaimer.classList.add('hidden');
            }
            
            if (data.url) {
                urlLink.innerHTML = `<strong>Fonte:</strong> <a href="${data.url}" target="_blank" style="color:#667eea">Ver original</a>`;
                urlLink.classList.remove('hidden');
            } else {
                urlLink.classList.add('hidden');
            }
            
            if (data.publisher) {
                publisherInfo.innerHTML = `<strong>Publicado por:</strong> ${data.publisher}`;
                publisherInfo.classList.remove('hidden');
            } else {
                publisherInfo.classList.add('hidden');
            }
            
            result.classList.remove('hidden');
            
            // Rola para o resultado
            result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // Eventos
        checkBtn.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            checkClaim();
            return false;
        };
        
        // Exemplos
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.onclick = function(e) {
                e.preventDefault();
                const text = this.getAttribute('data-text');
                claimInput.value = text;
                claimInput.focus();
                return false;
            };
        });
        
        // Ctrl+Enter para enviar
        claimInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                checkClaim();
            }
        });
        
        // Testar conexão ao carregar
        async function testConnection() {
            try {
                const response = await fetch('http://localhost:5000/health');
                if (response.ok) {
                    console.log('✅ Backend conectado');
                }
            } catch (error) {
                console.warn('⚠️ Backend não está rodando');
            }
        }
        
        testConnection();
        console.log('✅ Sistema pronto!');
    </script>
</body>
</html>
